# Discord Minutes Bot - Configuration
# ====================================
# Discord IDs must be filled in before running the bot.
# Secrets (token, API key) are loaded from .env, NOT this file.

discord:
  # List of guilds (servers) the bot monitors.
  # Each guild needs its own watch and output channels.
  # Old single-guild format (guild_id/watch_channel_id/output_channel_id) is
  # still supported for backward compatibility.
  guilds:
    - guild_id: 1027141726340657243
      # Channel ID where Craig Bot posts recording messages (0 = monitor all channels)
      # watch_channel_id: 1044060217882726470
      # Channel ID where meeting minutes will be posted
      output_channel_id: 1395775686924570655
      # Per-guild error mention role (optional, overrides global setting)
      # error_mention_role_id: 123456789
      # Per-guild Google Drive monitoring (optional, overrides global google_drive)
      # google_drive:
      #   enabled: true
      #   folder_id: "per_guild_drive_folder_id"

  # Role ID to mention when errors occur (optional, global fallback)
  error_mention_role_id: null

craig:
  # Craig Bot user ID (do not change unless Craig Bot changes)
  bot_id: "272937604339466240"
  # Craig download domain
  domain: "craig.chat"
  # Audio format for Cook API: aac, flac, ogg, mp3, wav
  cook_format: "aac"
  # Container format: zip, mix (zip = per-speaker files)
  cook_container: "zip"
  # Timeout in seconds for the Cook API download request
  download_timeout_sec: 300
  # Timeout in seconds for job API polling (waiting for cook to complete)
  poll_timeout_sec: 600
  # Number of retry attempts on failure
  max_retries: 2

whisper:
  # Backend: "local" (faster-whisper GPU) or "api" (OpenAI Speech-to-Text API)
  backend: "local"
  # Model size: tiny, base, small, medium, large-v1, large-v2, large-v3, etc.
  model: "large-v3"
  # Language: "ja", "en", "auto" (auto-detect), or other ISO 639-1 codes
  language: "auto"
  # Device: cuda or cpu (local backend only)
  device: "cuda"
  # Compute type: float16, int8, int8_float16, float32 (local backend only)
  compute_type: "float16"
  # Beam size for decoding (higher = more accurate but slower, local backend only)
  beam_size: 5
  # Enable Voice Activity Detection to skip silence (local backend only)
  vad_filter: true
  # OpenAI API model name (api backend only)
  api_model: "whisper-1"
  # Maximum retry attempts for API calls (api backend only)
  api_max_retries: 2
  # Timeout in seconds per API request (api backend only)
  api_timeout_sec: 300

merger:
  # Timestamp format in transcript (available: {mm}, {ss}, {hh})
  timestamp_format: "[{mm}:{ss}]"
  # Minimum characters for a segment to be included
  min_segment_chars: 1
  # Merge consecutive segments from same speaker if gap is below this (seconds)
  gap_merge_threshold_sec: 1.0

generator:
  # Backend: "claude" (default) or "openai_compat" (Ollama/vLLM/llama.cpp)
  # backend: "openai_compat"
  # base_url: "http://localhost:11434/v1"
  # Anthropic model for minutes generation
  model: "claude-sonnet-4-5-20250929"
  # Maximum tokens in the generated response
  max_tokens: 8192
  # Temperature (0.0 = deterministic, 1.0 = creative)
  temperature: 0.3
  # Path to the prompt template file
  prompt_template_path: "prompts/minutes.txt"
  # Number of retry attempts on API failure
  max_retries: 2

poster:
  # Discord embed sidebar color (hex integer)
  embed_color: 0x5865F2
  # User IDs to mention when minutes are posted (list of Discord user IDs)
  mention_user_ids: []
  # Maximum characters per embed description
  max_embed_length: 4000
  # Whether to include the full transcript as a follow-up message
  include_transcript: true
  # Maximum characters per message chunk (Discord limit is 2000)
  chunk_size: 1990

pipeline:
  # Timeout in seconds for local processing (transcription + minutes generation)
  processing_timeout_sec: 3600

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  # Log file path
  file: "logs/bot.log"
  # Maximum log file size in bytes (default: 10 MB)
  max_bytes: 10485760
  # Number of rotated log files to keep
  backup_count: 5

speaker_analytics:
  # Enable speaker statistics in minutes embed
  enabled: true

minutes_archive:
  # Enable local SQLite archive of generated minutes
  enabled: true
  # Maximum search results for /minutes search
  max_search_results: 5

export_google_docs:
  # Enable export of minutes to Google Docs
  enabled: false
  # Path to service account JSON key file
  credentials_path: "credentials.json"
  # Google Drive folder ID for exported documents
  folder_id: ""
  # Maximum retry attempts on export failure
  max_retries: 3

calendar:
  # Enable Google Calendar integration (auto-match meetings)
  enabled: false
  # Path to service account JSON key file
  credentials_path: "credentials.json"
  # Google Calendar ID to query
  calendar_id: "primary"
  # Timezone for recording window estimation
  timezone: "Asia/Tokyo"
  # Minutes of tolerance when matching events to recordings
  match_tolerance_minutes: 30
  # API request timeout in seconds
  api_timeout_sec: 10
  # Maximum retry attempts
  max_retries: 2

transcript_glossary:
  # Enable dictionary-based correction of Whisper transcription errors
  enabled: true
  # Case-sensitive matching (false = case-insensitive, recommended)
  case_sensitive: false

google_drive:
  # Enable Google Drive folder monitoring
  enabled: true
  # Path to service account JSON key file
  credentials_path: "credentials.json"
  # Google Drive folder ID to monitor (get from folder URL)
  folder_id: "18JpLtd8T_fzGOnHUei6cAO0NWty_qgSD"
  # Filename glob pattern to match Craig ZIP exports
  file_pattern: "craig[_-]*.aac.zip"
  # Polling interval in seconds
  poll_interval_sec: 30
  # Path to processed files tracking database (JSON)
  processed_db_path: "processed_files.json"
